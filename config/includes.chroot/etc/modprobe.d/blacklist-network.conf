# WiFi — blacklisting the base stack disables all WiFi drivers
blacklist cfg80211
blacklist mac80211

# Bluetooth
blacklist bluetooth
blacklist btusb
blacklist btrtl
blacklist btbcm
blacklist btintel

# Common wired NICs
blacklist e1000
blacklist e1000e
blacklist igb
blacklist igc
blacklist ixgbe
blacklist ixgbevf
blacklist r8169
blacklist tg3
blacklist bnx2
blacklist cxgb4
blacklist virtio_net
blacklist vmxnet3
